<!DOCTYPE html>
<html>
<head>
    <title>Multimodal Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="file"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .input-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .section-label {
            display: block;
            margin-bottom: 10px;
            color: #666;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .file-upload-box {
            position: relative;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-box:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .file-upload-box input[type="file"] {
            display: none;
        }

        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            gap: 10px;
        }

        .upload-icon {
            font-size: 32px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
        }

        .file-name {
            display: block;
            margin-top: 10px;
            color: #666;
            font-size: 13px;
            font-style: italic;
        }

        .extracted-text-box {
            margin-top: 15px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
        }

        .extracted-text-preview {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
            color: #333;
            word-break: break-word;
        }

        .preview-image {
            margin-top: 15px;
            max-width: 250px;
            border-radius: 8px;
            display: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 15px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .spinner::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .results.active {
            display: block;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .result-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .prediction {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }

        .prediction.real {
            color: #27ae60;
        }

        .prediction.fake {
            color: #e74c3c;
        }

        .prediction.uncertain {
            color: #f39c12;
        }

        .prediction.mixed {
            color: #9b59b6;
        }

        .confidence {
            font-size: 14px;
            color: #666;
            margin: 8px 0;
        }

        .probabilities {
            margin-top: 12px;
            font-size: 13px;
        }

        .prob-item {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            padding: 6px;
            background: white;
            border-radius: 4px;
        }

        .final-result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid white;
        }

        .final-result .result-title {
            color: white;
        }

        .reasoning {
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 6px;
            color: #333;
            font-size: 14px;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
        }

        .error.active {
            display: block;
        }

        canvas {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .metrics-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            .tabs {
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Multimodal Detector</h1>
    <p class="subtitle">Analyze news using image and text analysis</p>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('multimodal')">Multimodal</button>
        <button class="tab-btn" onclick="switchTab('image')">Image Only</button>
        <button class="tab-btn" onclick="switchTab('text')">Text Only</button>
    </div>

    <!-- MULTIMODAL TAB -->
    <div id="multimodal" class="tab-content active">
        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" id="imageMultimodal" accept="image/*" onchange="previewMultimodalImage()">
            <img id="previewMultimodal" class="preview-image">
        </div>

        <div class="form-group">
            <label>Enter News Text</label>
            <textarea id="textMultimodal" placeholder="Paste the news article here..."></textarea>
        </div>

        <button onclick="predictMultimodal()" id="btnMultimodal">Predict Multimodal</button>
        <div class="spinner" id="spinnerMultimodal"></div>
        <div class="error" id="errorMultimodal"></div>
        <div class="results" id="resultsMultimodal"></div>
    </div>

    <!-- IMAGE TAB -->
    <div id="image" class="tab-content">
        <div class="form-group">
            <label>Upload Image</label>
            <input type="file" id="imageOnly" accept="image/*" onchange="previewImageOnly()">
            <img id="previewImageOnly" class="preview-image">
        </div>

        <button onclick="predictImageOnly()" id="btnImageOnly">Predict Image</button>
        <div class="spinner" id="spinnerImageOnly"></div>
        <div class="error" id="errorImageOnly"></div>
        <div class="results" id="resultsImageOnly"></div>
    </div>

    <!-- TEXT TAB -->
    <div id="text" class="tab-content">
        <div class="form-group">
            <label>Enter or Upload News Text</label>

            <!-- Manual Text Input -->
            <div class="input-section">
                <label class="section-label">Type or paste text:</label>
                <textarea id="textOnly" placeholder="Paste the news article here..."></textarea>
            </div>

            <!-- File Upload Section -->
            <div class="input-section">
                <label class="section-label">Or upload a file:</label>
                <div class="file-upload-box">
                    <input type="file" id="textFile" accept=".txt,.pdf" onchange="handleFileUpload(event)">
                    <label for="textFile" class="file-upload-label">
                        <span class="upload-icon">📁</span>
                        <span class="upload-text">Click to upload or drag .txt/.pdf file</span>
                    </label>
                    <span class="file-name" id="fileName"></span>
                </div>
            </div>

            <!-- Extracted Text Preview -->
            <div class="extracted-text-box" id="extractedTextBox" style="display: none;">
                <label class="section-label">Extracted text (will be used for prediction):</label>
                <div class="extracted-text-preview" id="extractedTextPreview"></div>
            </div>
        </div>

        <button onclick="predictTextOnly()" id="btnTextOnly">Predict Text</button>
        <div class="spinner" id="spinnerTextOnly"></div>
        <div class="error" id="errorTextOnly"></div>
        <div class="results" id="resultsTextOnly"></div>
    </div>
</div>

<script>

let chartImage = null;
let chartText = null;

// ==================== FILE UPLOAD HANDLING ====================
function handleFileUpload(event) {
    let file = event.target.files[0];
    if (!file) return;

    let fileName = file.name;
    let fileExt = fileName.split('.').pop().toLowerCase();

    // Validate file type
    if (fileExt !== 'txt' && fileExt !== 'pdf') {
        showError("errorTextOnly", "Please upload .txt or .pdf file only");
        return;
    }

    // Show file name
    document.getElementById("fileName").textContent = `📄 ${fileName}`;

    // Read file
    let reader = new FileReader();

    reader.onload = function(e) {
        let content = e.target.result;

        // Handle PDF (needs special processing)
        if (fileExt === 'pdf') {
            extractPdfText(content);
        } else {
            // Handle TXT (simple text)
            displayExtractedText(content);
        }
    };

    if (fileExt === 'pdf') {
        reader.readAsArrayBuffer(file);
    } else {
        reader.readAsText(file);
    }
}

function displayExtractedText(text) {
    // Show preview
    document.getElementById("extractedTextBox").style.display = "block";
    let preview = text.length > 300 ? text.substring(0, 300) + "..." : text;
    document.getElementById("extractedTextPreview").textContent = preview;

    // Auto-fill textarea
    document.getElementById("textOnly").value = text;
}

// ==================== PDF TEXT EXTRACTION (CLIENT-SIDE PREVIEW) ====================
function extractPdfText(arrayBuffer) {
    // For security and simplicity, we'll just show a message
    // Actual extraction will happen on the backend via PyPDF2
    document.getElementById("extractedTextBox").style.display = "block";
    document.getElementById("extractedTextPreview").textContent =
        "PDF file selected. Text will be extracted on the server when you click 'Predict'.";
}

// ==================== TAB SWITCHING ====================
function switchTab(tabName) {
    // Hide all tabs
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

    // Show selected tab
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');
}

// ==================== PREVIEW FUNCTIONS ====================
function previewMultimodalImage() {
    let file = document.getElementById("imageMultimodal").files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = (e) => {
        let img = document.getElementById("previewMultimodal");
        img.src = e.target.result;
        img.style.display = "block";
    }
    reader.readAsDataURL(file);
}

function previewImageOnly() {
    let file = document.getElementById("imageOnly").files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = (e) => {
        let img = document.getElementById("previewImageOnly");
        img.src = e.target.result;
        img.style.display = "block";
    }
    reader.readAsDataURL(file);
}

// ==================== MULTIMODAL PREDICTION ====================
function predictMultimodal() {
    let imageFile = document.getElementById("imageMultimodal").files[0];
    let textInput = document.getElementById("textMultimodal").value.trim();

    let errorDiv = document.getElementById("errorMultimodal");
    errorDiv.classList.remove("active");

    if (!imageFile) {
        showError("errorMultimodal", "Please upload an image");
        return;
    }

    if (textInput.length < 10) {
        showError("errorMultimodal", "Please enter at least 10 characters of text");
        return;
    }

    let formData = new FormData();
    formData.append("image", imageFile);
    formData.append("text", textInput);

    toggleLoading("spinnerMultimodal", true);

    fetch("/predict-multimodal", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        toggleLoading("spinnerMultimodal", false);

        if (data.error) {
            showError("errorMultimodal", data.error);
            return;
        }

        displayMultimodalResults(data);
    })
    .catch(err => {
        toggleLoading("spinnerMultimodal", false);
        showError("errorMultimodal", "Error: " + err.message);
    });
}

function displayMultimodalResults(data) {
    let html = '';

    // Image prediction
    html += `<div class="result-card">
        <div class="result-title">Image Analysis</div>
        <div class="prediction ${data.image_prediction}">
            ${data.image_prediction.toUpperCase()}
        </div>
        <div class="confidence">Confidence: ${data.image_confidence}%</div>
        <div class="probabilities">
            <div class="prob-item">
                <span>AI:</span>
                <span>${data.image_probabilities.ai}%</span>
            </div>
            <div class="prob-item">
                <span>Deepfake:</span>
                <span>${data.image_probabilities.deepfake}%</span>
            </div>
            <div class="prob-item">
                <span>Real:</span>
                <span>${data.image_probabilities.real}%</span>
            </div>
        </div>
    </div>`;

    // Text prediction
    html += `<div class="result-card">
        <div class="result-title">Text Analysis</div>
        <div class="prediction ${data.text_prediction}">
            ${data.text_prediction.toUpperCase()}
        </div>
        <div class="confidence">Confidence: ${data.text_confidence}%</div>
        <div class="probabilities">
            <div class="prob-item">
                <span>Fake:</span>
                <span>${data.text_probabilities.fake}%</span>
            </div>
            <div class="prob-item">
                <span>Real:</span>
                <span>${data.text_probabilities.real}%</span>
            </div>
        </div>
    </div>`;

    // Final result
    let finalClass = data.final_result === 'real' ? 'real' :
                     data.final_result === 'fake' ? 'fake' :
                     data.final_result === 'mixed_signals' ? 'mixed' : 'uncertain';

    html += `<div class="final-result">
        <div class="result-title">Final Result</div>
        <div class="prediction ${finalClass}">
            ${data.final_result.toUpperCase()}
        </div>
        <div class="confidence">Confidence: ${data.final_confidence}%</div>
        <div class="reasoning">
            <strong>Analysis:</strong> ${data.reasoning}
        </div>
    </div>`;

    document.getElementById("resultsMultimodal").innerHTML = html;
    document.getElementById("resultsMultimodal").classList.add("active");
}

// ==================== IMAGE ONLY PREDICTION ====================
function predictImageOnly() {
    let imageFile = document.getElementById("imageOnly").files[0];

    if (!imageFile) {
        showError("errorImageOnly", "Please upload an image");
        return;
    }

    let formData = new FormData();
    formData.append("file", imageFile);

    toggleLoading("spinnerImageOnly", true);

    fetch("/predict-image", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        toggleLoading("spinnerImageOnly", false);

        if (data.error) {
            showError("errorImageOnly", data.error);
            return;
        }

        let html = `<div class="result-card">
            <div class="result-title">Image Prediction</div>
            <div class="prediction ${data.prediction}">
                ${data.prediction.toUpperCase()}
            </div>
            <div class="confidence">Confidence: ${data.confidence}%</div>
            <div class="probabilities">
                <div class="prob-item">
                    <span>AI:</span>
                    <span>${data.probabilities.ai}%</span>
                </div>
                <div class="prob-item">
                    <span>Deepfake:</span>
                    <span>${data.probabilities.deepfake}%</span>
                </div>
                <div class="prob-item">
                    <span>Real:</span>
                    <span>${data.probabilities.real}%</span>
                </div>
            </div>
        </div>`;

        document.getElementById("resultsImageOnly").innerHTML = html;
        document.getElementById("resultsImageOnly").classList.add("active");
    })
    .catch(err => {
        toggleLoading("spinnerImageOnly", false);
        showError("errorImageOnly", "Error: " + err.message);
    });
}

// ==================== TEXT ONLY PREDICTION ====================
function predictTextOnly() {
    let textInput = document.getElementById("textOnly").value.trim();
    let fileInput = document.getElementById("textFile");
    let file = fileInput.files[0];

    let errorDiv = document.getElementById("errorTextOnly");
    errorDiv.classList.remove("active");

    // Validate inputs
    if (!textInput && !file) {
        showError("errorTextOnly", "Please enter text or upload a file");
        return;
    }

    // If file is provided, send via FormData
    if (file) {
        let formData = new FormData();
        formData.append("file", file);

        toggleLoading("spinnerTextOnly", true);

        fetch("/predict-text", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            toggleLoading("spinnerTextOnly", false);
            if (data.error) {
                showError("errorTextOnly", data.error);
                return;
            }
            displayTextResults(data);
        })
        .catch(err => {
            toggleLoading("spinnerTextOnly", false);
            showError("errorTextOnly", "Error: " + err.message);
        });
    } else {
        // Send text via JSON
        if (textInput.length < 10) {
            showError("errorTextOnly", "Please enter at least 10 characters of text");
            return;
        }

        toggleLoading("spinnerTextOnly", true);

        fetch("/predict-text", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: textInput })
        })
        .then(res => res.json())
        .then(data => {
            toggleLoading("spinnerTextOnly", false);
            if (data.error) {
                showError("errorTextOnly", data.error);
                return;
            }
            displayTextResults(data);
        })
        .catch(err => {
            toggleLoading("spinnerTextOnly", false);
            showError("errorTextOnly", "Error: " + err.message);
        });
    }
}

function displayTextResults(data) {
    let sourceInfo = data.source === 'file' ?
        `<div class="confidence" style="color: #27ae60;">Source: File (${data.file_name})</div>` :
        '<div class="confidence" style="color: #667eea;">Source: Manual input</div>';

    let html = `<div class="result-card">
        ${sourceInfo}
        <div class="result-title" style="margin-top: 10px;">Text Prediction</div>
        <div class="prediction ${data.prediction}">
            ${data.prediction.toUpperCase()}
        </div>
        <div class="confidence">Confidence: ${data.confidence}%</div>
        <div class="probabilities">
            <div class="prob-item">
                <span>Fake:</span>
                <span>${data.probabilities.fake}%</span>
            </div>
            <div class="prob-item">
                <span>Real:</span>
                <span>${data.probabilities.real}%</span>
            </div>
        </div>
    </div>`;

    document.getElementById("resultsTextOnly").innerHTML = html;
    document.getElementById("resultsTextOnly").classList.add("active");
}

// ==================== UTILITY FUNCTIONS ====================
function toggleLoading(elementId, show) {
    let elem = document.getElementById(elementId);
    if (show) {
        elem.style.display = "block";
    } else {
        elem.style.display = "none";
    }
}

function showError(elementId, message) {
    let errorDiv = document.getElementById(elementId);
    errorDiv.textContent = message;
    errorDiv.classList.add("active");
}

</script>

</body>
</html>
